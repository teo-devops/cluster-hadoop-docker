[desktop]
  # Clave secreta para la seguridad de la sesión
  secret_key=hadoop_secret_key_12345
  http_host=0.0.0.0
  http_port=8888
  time_zone=UTC

  # Desactivamos apps que no hemos instalado para limpiar la interfaz
  app_blacklist=impala,security,hbase,search,spark,oozie,jobsub

[hadoop]
  # Configuración de HDFS
  [[hdfs_clusters]]
    [[[default]]]
      # Puerto de metadatos de HDFS
      fs_defaultfs=hdfs://namenode:9000
      # Interfaz Web de HDFS (WebHDFS)
      webhdfs_url=http://namenode:9870/webhdfs/v1
      # Usuario por defecto para las operaciones
      hadoop_bin=/opt/hadoop/bin/hadoop

  # Configuración de YARN (Gestor de recursos)
  [[yarn_clusters]]
    [[[default]]]
      resourcemanager_host=resourcemanager
      resourcemanager_port=8032
      submit_to=True
      resourcemanager_api_url=http://resourcemanager:8088
      history_server_api_url=http://historyserver:8188

[beeswax]

  hive_server_host=hive-server
  hive_server_port=10000
  hive_metastore_host=hive-metastore
  hive_metastore_port=9083
  # Versión de Thrift para Hive 2.x (usualmente 7)
  thrift_version=7
  # Interfaz del servidor
  server_interface=hiveserver2

[hiveserver2]
  # Hostname of HiveServer2.
  server_host=hive-server
  # Port of HiveServer2.
  server_port=10000
  # Versión de Thrift para Hive 2.x
  thrift_version=7

[notebook]
  # Habilitamos el editor SQL moderno
  show_notebooks=true
  [[interpreters]]
    [[[hive]]]
      name=Hive
      interface=hiveserver2
      options='{"url": "jdbc:hive2://hive-server:10000/default", "driver": "org.apache.hive.jdbc.HiveDriver"}'

[libstorage]
  # Permitir la carga de archivos locales a HDFS desde el navegador
  allow_local_upload=true